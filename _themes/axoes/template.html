<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title> - Aexo</title>
        <script src="/main.js"></script>
        <script src="/hl.min.js"></script>
        <link rel="stylesheet" href="/main.css">
        <link rel="stylesheet" href="/hl.css">
        <link rel="stylesheet" href="https://cdn.staticfile.org/font-awesome/4.7.0/css/font-awesome.css">
    </head>
    <body>
        <header class="level-no-padding">
            <a href="/" class="navbar-items">Architude</a>
            <div id="navbar-itembar">
                <a href="/archives/" class="navbar-items">Archives</a>
                <a href="/tags/" class="navbar-items">Tags</a>
                <a href="/categories/" class="navbar-items">Categories</a>
            </div>
            <a id="navbar-info" class="navbar-items" href="/about"><i class="fa fa-info-circle"></i></a>
            <div id="navbar-search" class="navbar-items" onclick="toggleSearch()"><i class="fa fa-search"></i></div>
        </header>
        <div id="search-container" class="level shadow-global">
            <div id="search-container-top" class="level-no-shadow">
            <i class="fa fa-search" id="in-menu-search" onclick="search()"></i>
            <input class="level" id="in-menu-search-input" oninput="search()"/>
                
            </div>
            <i class="fa fa-close bar-right" onclick="toggleSearch()"></i><br/>
            <data_cc_search>
                <data_cs_post class="be-filted">
                    <font>POSTS<hr></font>
                </data_cs_post><br/>
                <data_cs_page class="be-filted">
                    <font>PAGES<hr></font>
                </data_cs_page><br/>
                <data_cs_tag class="be-filted">
                    <font>TAGS<hr></font>
                </data_cs_tag><br/>
                <data_cs_category class="be-filted">
                    <font>CATEGORIES<hr></font>
                </data_cs_category><br/>
            </data_cc_search>
        </div>
        <section onclick="close_search()">
            <div class="container" id="container" onresize="resize()">
                <div id="column-left" class="flex-column">
                    <div id="intro-card" class="columns flex-column flex-center level">
                        <img id="data_c_avatar"/>
                        <font><data_c_name></data_c_name></font>
                        <font><data_c_discription></data_c_discription></font>
                        <font><i class="fa fa-map-marker"></i> <data_c_location></data_c_location></font>
                        <div id="intro-card-inner-count" class="flex-row">
                            <p>
                                文章<data_p_count_passage></data_p_count_passage>
                            </p>
                            <p>
                                分类<data_p_count_category></data_p_count_category>
                            </p>
                            <p>
                                标签<data_p_count_tag></data_p_count_tag>
                            </p>
                        </div>
                        <a id="followme" class="a_rendered_button">关注我</a>
                        <div id="intro-card-inner-blogInfo" class="flex-column">
                        </div>
                    </div>
                    <div id="data_toc" class="columns flex-column flex-center level toc">
                    </div>
                    <div class="columns flex-column flex-center level">alanqa-ops@outlook.com</div>
                </div>
                <div id="column-right" class="">
                    <div id="explorer" class="columns level">
                    <div id="main-intro">
                        <div id="main-intro-top">
                            <data_title></data_title>&nbsp
                            发布于 <data_date></data_date>
                            <data_category></data_category>
                        </div><data_tag class="inline-tag"></data_tag>
                    </div>
                    <data></data>
                    
                    </div>
                </div>
            </div>
        </section>
        <footer class="level-no-padding">
            2022 Aexo
        </footer>
        <script>resize()</script>
    </body>
</html>
