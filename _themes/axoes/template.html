<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title> - Aexo</title>
        <script src="/main.js"></script>
        <script src="/hl.min.js"></script>
        <link rel="stylesheet" href="/main.css">
        <link rel="stylesheet" href="/hl.css">
        <link rel="stylesheet" href="https://cdn.staticfile.org/font-awesome/4.7.0/css/font-awesome.css">
    </head>
    <body>
        <header class="level-no-padding">
            <a href="/">Architude</a>
            <div id="navbar-itembar"></div>
            <a id="navbar-info" href="/about"><i class="fa fa-info-circle"></i></a>
            <div id="navbar-search"><i class="fa fa-search"></i></div>
        </header>
        <section>
            <div class="container" id="container" onresize="resize()">
                <div id="column-left" class="flex-column">
                    <div id="intro-card" class="columns flex-column flex-center level">
                        <img id="data_c_avatar"/>
                        <font><data_c_name></data_c_name></font>
                        <font><data_c_discription></data_c_discription></font>
                        <font><i class="fa fa-map-marker"></i> <data_c_location></data_c_location></font>
                        <div id="intro-card-inner-count" class="flex-row">
                            <p>
                                文章<data_p_count_passage></data_p_count_passage>
                            </p>
                            <p>
                                分类<data_p_count_category></data_p_count_category>
                            </p>
                            <p>
                                标签<data_p_count_tag></data_p_count_tag>
                            </p>
                        </div>
                        <a id="followme" class="a_rendered_button">Follow Me</a>
                        <div id="intro-card-inner-blogInfo" class="flex-column">
                        </div>
                    </div>
                    <div id="data_toc" class="columns flex-column flex-center level toc">
                    </div>
                </div>
                <div id="column-right" class="level">
                    <div id="explorer" class="columns">
                    <div id="main-intro">
                        <div id="main-intro-top">
                            <data_title></data_title>&nbsp
                            发布于 <data_date></data_date>
                            <data_category></data_category>
                        </div><data_tag class="inline-tag"></data_tag>
                    </div>
                    <data></data>
                    </div>
                </div>
            </div>
        </section>
        <footer class="level-no-padding">
            2022 Aexo
        </footer>
    </body>
</html>
